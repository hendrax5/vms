version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vms_db
    environment:
      POSTGRES_USER: vms_user
      POSTGRES_PASSWORD: vmspassword
      POSTGRES_DB: vmsdb
    ports:
      - "5433:5432"
    volumes:
      - vms_db_data:/var/lib/postgresql/data
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vms_web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    depends_on:
      - db
    restart: always

  mail_worker:
    image: node:20-alpine
    container_name: vms_mail_worker
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - IMAP_HOST=${IMAP_HOST:-imap.example.com}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER:-vms@example.com}
      - IMAP_PASS=${IMAP_PASS:-password}
    depends_on:
      - db
    # Fixed from .js to .mjs and disabled default worker running until requested
    command: sh -c "apk add --no-cache openssl && npm install --legacy-peer-deps && node scripts/mail-worker.mjs"
    restart: unless-stopped

volumes:
  vms_db_data:
